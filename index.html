<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16162a">
<title>🇯🇵 東北・北信越</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #1e1e1e;
  --surface: #262626;
  --card: #2a2a2a;
  --card2: #242424;
  --accent: #8b5cf6;
  --accent2: #a78bfa;
  --text: #dcddde;
  --text2: #999999;
  --text3: #6c6c6c;
  --border: #363636;
  --green: #4caf7f;
  --orange: #d9894e;
  --red: #c85a5a;
  --blue: #5a8bc8;
  --r: 10px;
  --rs: 6px;
  --nav-h: 68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font-family:inherit}

/* ── APP SHELL ── */
#app{position:relative;width:100%;max-width:430px;height:100vh;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}

/* ── MAP ── */
#map{position:absolute;top:0;left:0;right:0;height:42%;z-index:1;transition:height .3s}
#map.hidden{height:0!important}
.leaflet-control-attribution{display:none}
.leaflet-tile-pane{filter:grayscale(1) brightness(1.02) contrast(.92)}
#map{background:#d8d8d8}

/* ── HEADER ── */
.hdr{position:relative;z-index:10;display:flex;align-items:center;padding:14px 16px 10px;background:var(--bg)}
.hdr-title{font-size:19px;font-weight:700;flex:1}
.hdr-btn{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px}
.hdr-btn:active{background:rgba(255,255,255,.1)}

/* ── PANEL ── */
.panel{position:absolute;bottom:0;left:0;right:0;z-index:20;background:var(--bg);border-radius:22px 22px 0 0;height:63%;display:flex;flex-direction:column;transition:height .3s}
.panel.full{height:100%!important;border-radius:0}
.panel-handle{width:100%;padding:12px 0 8px;cursor:grab;flex-shrink:0;display:flex;justify-content:center;align-items:center}
.panel-handle::after{content:'';width:36px;height:4px;background:var(--text3);border-radius:2px;display:block}

/* ── DATE STRIP ── */
.date-strip{display:flex;gap:6px;padding:10px 14px 6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.date-strip::-webkit-scrollbar{display:none}
.dc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:54px;padding:10px 8px;border-radius:12px;cursor:pointer;transition:all .2s;flex-shrink:0;color:var(--text3)}
.dc.active{background:var(--accent);color:#fff}
.dc .dn{font-size:15px;font-weight:700;line-height:1.1}
.dc .dl{font-size:12px;margin-top:4px;line-height:1}
.dc .dd{width:5px;height:5px;border-radius:50%;background:var(--accent2);margin-top:4px;opacity:0}
.dc.has-items .dd{opacity:1}
.dc.active .dd{background:white}

/* ── SCROLL AREA ── */
.tab-area{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h) + 8px);overscroll-behavior:contain}
.tab-area::-webkit-scrollbar{display:none}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;cursor:pointer;color:var(--text3);font-size:10.5px;transition:color .2s;border:none;background:none}
.ni.active{color:var(--accent)}
.ni svg{width:22px;height:22px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(123,108,246,.45);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s}
.fab:active{transform:translateX(-50%) scale(.93);box-shadow:0 2px 10px rgba(123,108,246,.3)}
.fab.hidden{display:none}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);margin:0 14px 10px;overflow:hidden}

/* ── FLIGHT TICKET ── */
.fcard{background:var(--card);border-radius:var(--r);margin:0 14px 8px;padding:12px 16px;position:relative;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.ftop{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.ftime{font-size:28px;font-weight:400;letter-spacing:.5px;line-height:1;flex-shrink:0}
.fmid{flex:1;display:flex;align-items:center}
.fline{width:100%;display:flex;align-items:center;gap:0}
.fdot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.fdash{flex:1;height:1px;background:var(--border)}
.fahead{color:var(--text3);font-size:14px;line-height:1;flex-shrink:0}
.fdur{font-size:10px;color:var(--text3);letter-spacing:.3px;text-align:center;margin-bottom:6px}
.fbot{display:flex;align-items:center;justify-content:space-between}
.fcode{font-size:11px;font-weight:700;background:rgba(139,92,246,.15);color:var(--accent2);padding:3px 8px;border-radius:6px;letter-spacing:.5px}
.finfo{display:flex;align-items:center;justify-content:center;gap:6px;flex:1;padding:0 10px}
.fainame{font-size:11px;color:var(--text2)}
.fnum{font-size:11px;font-weight:600;color:var(--text2)}
.tdiv{display:flex;align-items:center;margin:10px -12px}

.tcirc{width:18px;height:18px;border-radius:50%;background:var(--bg);flex-shrink:0}
.tdash{flex:1;border-top:2px dashed var(--border);margin:0 4px}
.ffoot{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}

/* ── ITINERARY ITEMS ── */
.ilist{padding:0}
.iitem{display:flex;align-items:flex-start;gap:14px;padding:11px 14px;position:relative;cursor:pointer;transition:background .15s;border-radius:0}
.iitem:active{background:rgba(255,255,255,.03)}
.iitem:not(:last-child)::after{content:'';position:absolute;left:52px;top:44px;bottom:0;width:2px;background:var(--border)}
.itime{font-size:12px;color:var(--text2);min-width:38px;padding-top:5px;flex-shrink:0}
.iico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;position:relative;z-index:1}
.ibody{flex:1;min-width:0}
.ititle{font-size:14px;font-weight:600;line-height:1.3}
.isub{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:4px}
.iacts{display:flex;gap:6px;align-items:center;flex-shrink:0;opacity:0;transition:opacity .2s}
.iitem:hover .iacts{opacity:1}
.abtn{width:26px;height:26px;border:none;background:var(--bg);border-radius:6px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.drag-h{color:var(--text3);cursor:grab;padding:4px 2px;font-size:16px;flex-shrink:0;touch-action:none;line-height:1}

/* ── WEATHER ── */
.wx{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(123,108,246,.08);border-radius:var(--r);margin:0 14px 10px;border:1px solid rgba(123,108,246,.15)}
.wx-ico{font-size:26px}
.wx-info{flex:1}
.wx-loc{font-size:10px;color:var(--text3)}
.wx-temp{font-size:18px;font-weight:700}
.wx-right{text-align:right;font-size:12px;color:var(--text2)}

/* ── PANEL HANDLE ── */
.panel.full .panel-handle{display:none}

/* ── DAY TITLE ── */
.day-title-wrap{padding:14px 14px 10px}
.day-title{font-size:20px;font-weight:700;line-height:1.3;outline:none;border-radius:6px;padding:0;transition:background .15s;color:var(--text);cursor:text;display:block;width:100%;box-sizing:border-box;word-break:break-word;user-select:none}
.day-title:focus{outline:none;padding:4px;margin:-4px}
.day-title:focus{background:rgba(255,255,255,.06);user-select:text}
.day-title:empty::before{content:'為今日命名...';color:var(--text3);font-weight:400;font-size:18px}
.day-title-sub{display:none;font-size:12px;color:var(--text3);margin-top:4px;padding-left:4px}
.day-title-wrap.focused .day-title-sub{display:block}

/* ── SECTION HEADER ── */
.sh{display:flex;justify-content:space-between;align-items:center;padding:6px 14px 4px}
.sh-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.sh-btn{background:var(--accent);border:none;color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer}

/* ── EXPENSE DASHBOARD ── */
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 14px 10px}
.scard{background:var(--card);border-radius:var(--r);padding:13px;text-align:center}
.sv{font-size:16px;font-weight:800;line-height:1}
.sl{font-size:10px;color:var(--text2);margin-top:4px}
.chart-wrap{background:var(--card);border-radius:var(--r);margin:0 14px 10px;padding:16px}
.chart-ttl{font-size:13px;font-weight:600;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── EXPENSE ITEMS ── */
.eitem{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--card);border-radius:var(--r);margin:0 14px 8px;cursor:pointer;transition:transform .15s}
.eitem:active{transform:scale(.98)}
.eico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ebody{flex:1;min-width:0}
.etitle{font-size:13px;font-weight:600}
.edate{font-size:10px;color:var(--text2);margin-top:2px}
.eamt{font-size:15px;font-weight:800;color:var(--accent)}

/* ── RATE ── */
.rcard{background:var(--card);border-radius:var(--r);margin:0 14px 10px;padding:20px}
.rinput-wrap{display:flex;align-items:center;gap:8px}
.rcurr{font-size:22px;font-weight:700;color:var(--text2);width:20px}

/* ── TODO ── */
.titem{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--card);border-radius:var(--r);margin:0 14px 8px}
.tchk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.tchk.done{background:var(--green);border-color:var(--green)}
.ttxt{flex:1;font-size:13px;cursor:pointer}
.ttxt.done{text-decoration:line-through;color:var(--text3)}
.tdate{font-size:10px;color:var(--text3);margin-top:2px}

/* ── BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.on{opacity:1;pointer-events:all}
.bsheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:430px;background:var(--surface);border-radius:22px 22px 0 0;z-index:201;transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.bsheet.on{transform:translateX(-50%) translateY(0)}
.bs-handle{width:34px;height:4px;background:var(--text3);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.bs-hdr{display:flex;align-items:center;padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.bs-title{font-size:16px;font-weight:700;flex:1}
.bs-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;border-radius:8px}
.bs-body{flex:1;overflow-y:auto;padding:14px}
.bs-body::-webkit-scrollbar{display:none}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);padding:11px 13px;font-size:14px;outline:none;transition:border .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--text3)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}

/* ── CATEGORY CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.chip{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:all .2s;background:var(--bg)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── BUTTONS ── */
.btn{padding:13px;border-radius:var(--r);border:none;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:transform .15s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#fff}
.btn-d{background:rgba(224,85,85,.15);color:var(--red);border:1.5px solid var(--red);margin-top:8px}
.btn-g{background:var(--border);color:var(--text2)}

/* ── RECEIPT ── */
.rec-upload{display:block;border:2px dashed var(--border);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:border .2s;margin-bottom:12px;background:var(--bg)}
.rec-upload:hover{border-color:var(--accent)}

/* ── MISC ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty .ei{font-size:42px;margin-bottom:10px}
.empty p{font-size:13px}
.divider{height:1px;background:var(--border);margin:4px 14px 12px}
.badge{display:inline-flex;background:var(--accent);color:#fff;border-radius:20px;font-size:10px;padding:2px 8px;font-weight:700;margin-left:6px;vertical-align:middle}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.anim{animation:fadeUp .25s ease forwards}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:8px}
.prog-bar{height:100%;border-radius:4px;background:var(--accent);transition:width .4s}

/* ── INLINE ADD BUTTON (行程/旅費 尾端) ── */
.add-inline{display:block;width:calc(100% - 28px);margin:8px 14px 14px;padding:12px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.add-inline:hover{border-color:var(--accent);color:var(--accent);background:rgba(139,92,246,.05)}
.sh-plus{background:none;border:none;color:var(--accent);font-size:18px;line-height:1;cursor:pointer;padding:2px 6px;border-radius:6px}
.sh-plus:hover{background:rgba(139,92,246,.15)}
.legend-amt{font-size:11px;color:var(--text3);font-weight:400;margin-left:6px}
.legend-pct{font-size:12px;color:var(--text);font-weight:700}

/* ── TAB BAR CENTER PLUS ── */
.ni-plus{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;margin-top:-22px;border:4px solid var(--surface);box-shadow:0 4px 14px rgba(139,92,246,.5);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:300;line-height:1;flex-shrink:0;cursor:pointer;transition:transform .15s,opacity .2s,background .2s}
.ni-plus:active{transform:scale(.92)}
.ni-plus.hidden{opacity:0;pointer-events:none;transform:scale(.8)}

/* ── SUB TABS (expense) ── */
.sub-tabs{display:flex;gap:4px;margin:0 14px 10px;background:var(--card);border-radius:var(--r);padding:4px}
.sub-tab{flex:1;padding:9px 12px;text-align:center;background:none;border:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .2s}
.sub-tab.on{background:var(--accent);color:#fff}

/* ── PRE-TRIP SUMMARY ── */
.pretrip-summary{background:var(--card);border-radius:var(--r);padding:14px;margin:0 14px 10px;display:flex;align-items:center;gap:12px}
.pre-cat-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px}
.pre-cat-chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div class="hdr">
    <div class="hdr-title">🇯🇵 東北・北信越</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="syncDot" title="連線中..." style="width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background .4s"></div>
      <button class="hdr-btn" onclick="openSettings()">⚙</button>
    </div>
  </div>

  <div class="panel" id="panel">
    <div class="panel-handle" id="panelHandle"></div>
    <div class="date-strip" id="dateStrip"></div>
    <div class="tab-area" id="tabArea"></div>
  </div>

  <nav class="bnav">
    <button class="ni active" id="ni-iti" onclick="switchTab('iti')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>行程
    </button>
    <button class="ni" id="ni-exp" onclick="switchTab('exp')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>記帳
    </button>
    <button class="ni-plus" id="niPlus" onclick="handlePlus()">＋</button>
    <button class="ni" id="ni-rate" onclick="switchTab('rate')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>匯率
    </button>
    <button class="ni" id="ni-todo" onclick="switchTab('todo')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Todo
    </button>
  </nav>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bsheet" id="bsheet">
  <div class="bs-handle"></div>
  <div class="bs-hdr">
    <div class="bs-title" id="bsTitle"></div>
    <button class="bs-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="bs-body" id="bsBody"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const T0 = '2026-07-25', T1 = '2026-08-06';
const DAYS = ['日','一','二','三','四','五','六'];

const ICAT = {
  flight:   {l:'航班',  i:'✈️', c:'#7b6cf6'},
  hotel:    {l:'飯店',  i:'🏨', c:'#ff6b6b'},
  food:     {l:'餐飲',  i:'🍜', c:'#ff9f43'},
  transport:{l:'交通',  i:'🚆', c:'#54a0ff'},
  spot:     {l:'景點',  i:'📍', c:'#7b6cf6'},
  shopping: {l:'購物',  i:'🛍', c:'#00d2d3'},
  activity: {l:'活動',  i:'🎌', c:'#1dd1a1'},
  other:    {l:'其他',  i:'📌', c:'#8395a7'},
};
const ECAT = {
  food:          {l:'餐飲', i:'🍜', c:'#ff9f43'},
  transport:     {l:'交通', i:'🚆', c:'#54a0ff'},
  accommodation: {l:'住宿', i:'🏨', c:'#ff6b6b'},

let map, rLayer, mLayer;
function initMap(){
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([36.5,138.5],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  rLayer = L.layerGroup().addTo(map);
  mLayer = L.layerGroup().addTo(map);
}
function updateMap(){
  rLayer.clearLayers(); mLayer.clearLayers();
  const pts = S.itiItems.filter(i=>i.date===S.date&&i.lat&&i.lng&&!i.isFlight)
                         .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  if(!pts.length) return;
  // 偏移重疊座標：相同座標的標記用螺旋方式展開
  const seen={};
  const placed=pts.map(p=>{
    const key=`${p.lat},${p.lng}`;
    const n=seen[key]=(seen[key]||0)+1;
    if(n===1) return {lat:p.lat,lng:p.lng};
    const angle=(n-2)*(Math.PI*2/6), r=0.00015;
    return {lat:p.lat+Math.cos(angle)*r, lng:p.lng+Math.sin(angle)*r};
  });
  const coords=placed.map(p=>[p.lat,p.lng]);
  if(coords.length>1) L.polyline(coords,{color:'#7b6cf6',weight:2.5,dashArray:'8 5',opacity:.75}).addTo(rLayer);
  pts.forEach((p,i)=>{
    const isH=p.cat==='hotel';
    const col=isH?'#ff6b6b':'#8b5cf6';
    const ico=L.divIcon({
      html:`<div style="background:${col};color:#fff;width:${isH?32:26}px;height:${isH?32:26}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${isH?15:12}px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);font-weight:700">${isH?'🏨':(i+1)}</div>`,
      iconSize:[isH?32:26,isH?32:26],iconAnchor:[isH?16:13,isH?16:13],className:''
    });
    L.marker([placed[i].lat,placed[i].lng],{icon:ico}).bindPopup(`<b>${p.title}</b>${p.time?'<br>'+p.time:''}`).addTo(mLayer);
  });
  coords.length===1?map.setView(coords[0],15):map.fitBounds(coords,{padding:[40,40]});
}

const wxCache={};
const WI={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',61:'🌧',63:'🌧',71:'🌨',73:'🌨',80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
const WD={0:'晴天',1:'大致晴',2:'局部多雲',3:'陰天',45:'霧',48:'霧',51:'毛毛雨',53:'小雨',61:'小雨',63:'中雨',71:'小雪',73:'中雪',80:'陣雨',81:'大雨',82:'強降雨',95:'雷陣雨',96:'雷陣雨',99:'大雷雨'};
function wxIcon(c){return WI[c]||WI[Math.floor(c/10)*10]||'🌡'}
function wxDesc(c){return WD[c]||WD[Math.floor(c/10)*10]||'未知'}
async function fetchWx(date){
  if(wxCache[date]) return;
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=38.268&longitude=140.869&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&start_date=${date}&end_date=${date}`);
    const d=await r.json();
    if(d.daily){
      wxCache[date]={code:d.daily.weathercode[0],max:Math.round(d.daily.temperature_2m_max[0]),min:Math.round(d.daily.temperature_2m_min[0])};
      if(S.tab==='iti') renderContent();
    }
  }catch(e){}
}

function renderIti(){
  const day=S.itiItems.filter(i=>i.date===S.date).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const wx=wxCache[S.date];
  let h='';

  // Departure suggestion — rendered as first ilist item later
  const firstActivity=day.find(i=>!i.isFlight&&i.cat!=='hotel'&&i.time)||day.find(i=>!i.isFlight&&i.cat!=='hotel');
  const firstFlight=day.find(i=>i.isFlight&&i.depTime);
  let depSug='', depSugNote='';
  if(firstFlight){
    const [fh,fm]=firstFlight.depTime.split(':').map(Number);
    let mm=fh*60+fm-150;
    if(mm<0) mm+=1440;
    depSug=`${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;
    depSugNote=`航班 ${firstFlight.flightNo} ${firstFlight.depTime} 起飛，建議提前 2.5h`;
  } else if(firstActivity){
    if(firstActivity.time){
      const [h1,m1]=firstActivity.time.split(':').map(Number);
      let mm=h1*60+m1-20; if(mm<0) mm+=1440;
      depSug=`${String(Math.floor(mm/60)).padStart(2,'0')}:${String(mm%60).padStart(2,'0')}`;
      depSugNote=`首站「${firstActivity.title}」${firstActivity.time}，建議提前 20 分鐘`;
    } else {
      depSug='08:30'; depSugNote=`首站「${firstActivity.title}」尚未設定時間`;
    }
  }

  // Day title
  if(!S.dayTitles) S.dayTitles={};
  const titleVal=S.dayTitles[S.date]||'';
  const d0=new Date(S.date);
  const dateSub=`${d0.getMonth()+1}/${d0.getDate()} 週${DAYS[d0.getDay()]}`;
  h+=`<div class="day-title-wrap">
    <div class="day-title" contenteditable="true" spellcheck="false"
      onfocus="this.parentElement.classList.add('focused')"
      onblur="this.parentElement.classList.remove('focused');if(!S.dayTitles)S.dayTitles={};S.dayTitles['${S.date}']=this.textContent.trim();save()"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
    >${titleVal}</div>
    <div class="day-title-sub">${dateSub}</div>
  </div>`;

  if(wx){
    h+=`<div class="wx anim">
      <div class="wx-ico">${wxIcon(wx.code)}</div>
      <div class="wx-info">
        <div class="wx-loc">仙台 參考天氣</div>
        <div class="wx-temp">${wx.max}° / ${wx.min}°</div>
      </div>
      <div class="wx-right">${wxDesc(wx.code)}</div>
    </div>`;
  }

  const flights=day.filter(i=>i.isFlight);
  const rest=day.filter(i=>!i.isFlight);

  flights.forEach(f=>{ h+=renderFlight(f); });

  if(rest.length||depSug){
    h+=`<div class="ilist" id="ilist">`;
    if(depSug){
      h+=`<div class="iitem" style="opacity:.65">
        <div class="itime" style="color:var(--accent);font-weight:700">${depSug}</div>
        <div class="iico" style="background:rgba(139,92,246,.18);color:var(--accent)">🚶</div>
        <div class="ibody">
          <div class="ititle" style="color:var(--accent);font-size:13px">建議出發</div>
          <div class="isub">${depSugNote}</div>
        </div>
      </div>`;
    }
    rest.forEach(it=>{ h+=renderItiItem(it); });
    h+=`</div>`;
  }

  if(!day.length){
    h+=`<div class="empty"><div class="ei">📅</div><p>今日尚無行程</p></div>`;
  }
  h+=`<button class="add-inline" onclick="openAddIti()">＋ 新增行程</button>`;
  return h;
}

  // 支出明細 — 按日期分群，最新在前
  if(!all.length){

let rate=4.65; // TWD per JPY
async function fetchRate(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/JPY');
    const d=await r.json();
    if(d.rates?.TWD){ rate=d.rates.TWD; updateRateUI(); }
  }catch(e){ updateRateUI(); }
}
function updateRateUI(){
  const r1=document.getElementById('rDisp1');
  const r2=document.getElementById('rDisp2');
  if(r1) r1.textContent=`1 JPY ≈ ${rate.toFixed(4)} TWD`;
  if(r2) r2.textContent=`1 TWD ≈ ${(1/rate).toFixed(1)} JPY`;
  cvtJpy();
}
function cvtJpy(){
  const j=parseFloat(document.getElementById('jIn')?.value)||0;
  const ti=document.getElementById('tIn');
  if(ti&&j>0) ti.value=Math.round(j*rate);
  else if(ti) ti.value='';
}
function cvtTwd(){
  const t=parseFloat(document.getElementById('tIn')?.value)||0;
  const ji=document.getElementById('jIn');
  if(ji&&t>0) ji.value=Math.round(t/rate);
  else if(ji) ji.value='';
}

  return`<div style="padding:24px 0 0">

function renderTodo(){

    h+=`<div class="sh"><span class="sh-title">${cat}</span>

        <span style="font-size:10px;color:var(--text3)">${dc}/${items.length}</span>

function saveIti(eid){
  const cat=document.getElementById('iCat').value;
  const isFlight=cat==='flight';
  let item;
  if(isFlight){
    const fNo=document.getElementById('fNo').value||'';
    const dC=document.getElementById('depC').value.toUpperCase()||'';
    const aC=document.getElementById('arrC').value.toUpperCase()||'';
    const dT=document.getElementById('dTime').value||'';
    const aT=document.getElementById('aTime').value||'';
    const air=document.getElementById('fAir').value||'';
    if(!fNo){alert('請填寫航班編號');return;}
    let dur=0;
    if(dT&&aT){
      const [dh,dm]=dT.split(':').map(Number);
      const [ah,am]=aT.split(':').map(Number);
      dur=(ah*60+am)-(dh*60+dm);
      if(dur<0) dur+=24*60;
    }
    item={id:eid||uid('f'),date:S.date,cat:'flight',isFlight:true,flightNo:fNo,airline:air,depCode:dC,arrCode:aC,depTime:dT,arrTime:aT,dur,title:`${fNo} ${dC}→${aC}`,time:dT,note:air};
  } else {
    const title=document.getElementById('iTitle').value;
    if(!title){alert('請填寫名稱');return;}
    const lat=parseFloat(document.getElementById('iLat').value);
    const lng=parseFloat(document.getElementById('iLng').value);
    item={id:eid||uid('i'),date:document.getElementById('iDate').value,time:document.getElementById('iTime').value,title,cat,note:document.getElementById('iNote').value,lat:isNaN(lat)?undefined:lat,lng:isNaN(lng)?undefined:lng};
  }
  if(eid){const idx=S.itiItems.findIndex(i=>i.id===eid);if(idx>=0)S.itiItems[idx]=item;}
  else S.itiItems.push(item);
  save(); closeSheet(); renderStrip(); renderContent(); updateMap();
}

function parseMapUrl(){
  const url=document.getElementById('iMapUrl').value.trim();
  const status=document.getElementById('iMapStatus');
  const latEl=document.getElementById('iLat');
  const lngEl=document.getElementById('iLng');
  if(!url){ status.textContent='未設定座標'; status.style.color='var(--text3)'; return; }
  let m;
  // Pattern 1: @lat,lng (Google Maps standard URL)
  if((m=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/))){}
  // Pattern 2: !3dlat!4dlng (place details)
  else if((m=url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/))){}
  // Pattern 3: ?q=lat,lng or &ll=lat,lng or center=lat,lng
  else if((m=url.match(/[?&](?:q|ll|center|destination)=(-?\d+\.\d+),(-?\d+\.\d+)/))){}
  // Pattern 4: plain "lat,lng" or "lat, lng"
  else if((m=url.match(/^(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)$/))){}
  if(m){
    const lat=parseFloat(m[1]), lng=parseFloat(m[2]);
    latEl.value=lat; lngEl.value=lng;
    status.textContent=`✓ 已解析座標：${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    status.style.color='var(--green)';
  } else if(url.includes('goo.gl')||url.includes('maps.app.goo.gl')){

  } else {

async function processReceipt(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    document.getElementById('rcImg').src=e.target.result;
    document.getElementById('rcPreview').style.display='block';
    const key=document.getElementById('rcKey').value||S.apiKey;
    if(key){ S.apiKey=key; save(); }
    if(!key){
      setRcStatus('請輸入 Claude API Key 以啟用 AI 辨識，或手動填寫下方欄位','#f0a030');
      return;
    }
    setRcStatus('🤖 AI 辨識中...','#7b6cf6');
    try{
      const b64=e.target.result.split(',')[1];
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
          {type:'text',text:'辨識這張日本收據。JSON格式回傳：{"store":"店名(繁體中文)","amount":數字,"items":"品項(繁體中文,逗號分隔)","tax":"內稅/外稅/免稅","category":"food/transport/accommodation/shopping/activity/other"}。只回傳JSON。'}
        ]}]})
      });
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      const txt=data.content[0].text.replace(/```json|```/g,'').trim();
      const r=JSON.parse(txt);
      document.getElementById('rcStore').value=r.store||'';
      document.getElementById('rcAmt').value=r.amount||'';
      document.getElementById('rcCat').value=r.category||'food';
      document.getElementById('rcItems').value=`${r.items||''}${r.tax?' ('+r.tax+')':''}`;
      setRcStatus('✓ AI 辨識完成，請確認資訊','#4ccea0');
    }catch(err){
      setRcStatus(`辨識失敗：${err.message}，請手動填寫`,'#e05555');
    }
  };
  reader.readAsDataURL(file);
}
function setRcStatus(msg, col){
  const el=document.getElementById('rcStatus');
  if(el){el.textContent=msg;el.style.color=col;}
}
function saveReceipt(){
  const item={id:uid('e'),date:S.date,cat:document.getElementById('rcCat').value,title:document.getElementById('rcStore').value||'收據',amount:parseInt(document.getElementById('rcAmt').value)||0,note:document.getElementById('rcItems').value};
  S.expenses.push(item);
  save(); closeSheet(); renderStrip(); renderContent();
}

// PANEL DRAG
// ═══════════════════════════════════════════════
function initPanelDrag(){
  const handle=document.getElementById('panelHandle');
  const panel=document.getElementById('panel');
  const mapEl=document.getElementById('map');
  const SNAP_HIGH=0.63, SNAP_LOW=0.22;
  let startY, startH;
  function setHeights(panelH, animate){
    const t=animate?'height .3s':'none';
    panel.style.transition=t;
    mapEl.style.transition=t;
    panel.style.height=panelH+'px';
    mapEl.style.height=(window.innerHeight-panelH)+'px';
  }
  handle.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
    startH=panel.getBoundingClientRect().height;
    panel.style.transition='none';
    mapEl.style.transition='none';
  },{passive:true});
  handle.addEventListener('touchmove',e=>{
    if(startY==null) return;
    const dy=e.touches[0].clientY-startY;
    const nh=Math.max(window.innerHeight*SNAP_LOW,Math.min(window.innerHeight*.92,startH-dy));
    setHeights(nh, false);
    map?.invalidateSize();
  },{passive:true});
  handle.addEventListener('touchend',e=>{
    if(startY==null) return;
    const cur=panel.getBoundingClientRect().height;
    const mid=window.innerHeight*(SNAP_HIGH+SNAP_LOW)/2;
    const target=window.innerHeight*(cur>mid?SNAP_HIGH:SNAP_LOW);
    setHeights(target, true);
    setTimeout(()=>map?.invalidateSize(),320);
    startY=null;
  },{passive:true});
}
